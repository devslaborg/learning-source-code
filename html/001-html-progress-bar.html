<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fancy Progress Bar</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050816;
}

.card{
    width:380px;
    padding:35px;
    border-radius:20px;
    background:#111827;
    text-align:center;
    color:white;
    box-shadow:0 0 30px rgba(59,130,246,.25);
}

.percent{
    font-size:60px;
    font-weight:700;
    color:#38bdf8;
    text-shadow:0 0 4px rgba(56,189,248,.5);
    margin-bottom:15px;
}

h2{
    margin-bottom:20px;
    font-weight:500;
}

progress{
    width:100%;
    height:22px;
}

progress::-webkit-progress-bar{
    background:#1f2937;
    border-radius:20px;
}

progress::-webkit-progress-value{
    background:linear-gradient(
        90deg,
        #00DBDE,
        #FC00FF
    );
    border-radius:20px;
}

.status{
    margin-top:18px;
    color:#94a3b8;
    font-size:15px;
    letter-spacing:1px;
}

</style>

</head>

<body>

<div class="card">

<div class="percent">88%</div>

<h2>Project Progress</h2>

<progress value="88" max="100"></progress>

<div class="status">Almost Complete 🚀</div>

</div>

</body>
</html>
