<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Skeleton</title>
    <style>
        .skeleton {
            background: linear-gradient(90deg,
                    #eee 25%,
                    #ddd 50%,
                    #eee 75%
            );
            background-size: 200%;
            height: 150px;
            width: 200px;
            animation: shine 1.5s infinite;
        }
    
        @keyframes shine {
            to {
                background-position: -200px;
            }
        }
    </style>
</head>
<body>
    <div class="skeleton"></div>
</body>
</html>
